name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build packages
        run: |
          npm run build -w packages/aver
          npm run build -w packages/protocol-http
          npm run build -w packages/protocol-playwright
          npm run build -w examples/e-commerce

      - run: npx playwright install --with-deps chromium

      - name: Test aver (core)
        run: npx vitest run --reporter=junit --reporter=github-actions --reporter=default --outputFile=../../test-results/aver.xml
        working-directory: packages/aver

      - name: Test mcp-server
        if: ${{ !cancelled() }}
        run: npx vitest run --reporter=junit --reporter=github-actions --reporter=default --outputFile=../../test-results/mcp-server.xml
        working-directory: packages/mcp-server

      - name: Test protocol-http
        if: ${{ !cancelled() }}
        run: npx vitest run --reporter=junit --reporter=github-actions --reporter=default --outputFile=../../test-results/protocol-http.xml
        working-directory: packages/protocol-http

      - name: Test protocol-playwright
        if: ${{ !cancelled() }}
        run: npx vitest run --reporter=junit --reporter=github-actions --reporter=default --outputFile=../../test-results/protocol-playwright.xml
        working-directory: packages/protocol-playwright

      - name: Test example app
        if: ${{ !cancelled() }}
        run: npx vitest run --reporter=junit --reporter=github-actions --reporter=default --outputFile=../../test-results/e-commerce.xml
        working-directory: examples/e-commerce

      - name: Test Report
        uses: mikepenz/action-junit-report@v5
        if: ${{ !cancelled() }}
        with:
          report_paths: '**/test-results/*.xml'
          check_name: Test Results
          fail_on_failure: true
          detailed_summary: true
          include_passed: true

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: test-results
          path: |
            test-results/
            examples/e-commerce/test-results/
