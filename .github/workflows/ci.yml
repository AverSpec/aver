name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: |
          pnpm --filter @aver/core run build
          pnpm --filter @aver/workspace run build
          pnpm --filter @aver/approvals run build
          pnpm --filter @aver/agent run build
          pnpm --filter @aver/eval run build
          pnpm --filter @aver/mutation-testing run build
          pnpm --filter @aver/reconcile run build
          pnpm --filter @aver/telemetry run build
          pnpm --filter @aver/mcp-server run build
          pnpm --filter @aver/protocol-http run build
          pnpm --filter @aver/protocol-playwright run build
          pnpm --filter @aver/example-task-board run build

      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(pnpm exec playwright --version)" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright
        run: pnpm exec playwright install --with-deps chromium

      - name: Test core
        run: pnpm exec vitest run --reporter=junit --reporter=github-actions --reporter=default --outputFile.junit=../../test-results/aver.xml
        working-directory: packages/core

      - name: Test workspace
        if: ${{ !cancelled() }}
        run: pnpm exec vitest run --reporter=junit --reporter=github-actions --reporter=default --outputFile.junit=../../test-results/workspace.xml
        working-directory: packages/workspace

      - name: Test approvals
        if: ${{ !cancelled() }}
        run: pnpm exec vitest run --reporter=junit --reporter=github-actions --reporter=default --outputFile.junit=../../test-results/approvals.xml
        working-directory: packages/approvals

      - name: Test agent
        if: ${{ !cancelled() }}
        run: pnpm exec vitest run --reporter=junit --reporter=github-actions --reporter=default --outputFile.junit=../../test-results/agent.xml
        working-directory: packages/agent

      - name: Test eval
        if: ${{ !cancelled() }}
        run: pnpm exec vitest run --reporter=junit --reporter=github-actions --reporter=default --outputFile.junit=../../test-results/eval.xml
        working-directory: packages/eval

      - name: Test mutation-testing
        if: ${{ !cancelled() }}
        run: pnpm exec vitest run --reporter=junit --reporter=github-actions --reporter=default --outputFile.junit=../../test-results/mutation-testing.xml
        working-directory: packages/mutation-testing

      - name: Test reconcile
        if: ${{ !cancelled() }}
        run: pnpm exec vitest run --reporter=junit --reporter=github-actions --reporter=default --outputFile.junit=../../test-results/reconcile.xml
        working-directory: packages/reconcile

      - name: Test telemetry
        if: ${{ !cancelled() }}
        run: pnpm exec vitest run --reporter=junit --reporter=github-actions --reporter=default --outputFile.junit=../../test-results/telemetry.xml
        working-directory: packages/telemetry

      - name: Test mcp-server
        if: ${{ !cancelled() }}
        run: pnpm exec vitest run --reporter=junit --reporter=github-actions --reporter=default --outputFile.junit=../../test-results/mcp-server.xml
        working-directory: packages/mcp-server

      - name: Test protocol-http
        if: ${{ !cancelled() }}
        run: pnpm exec vitest run --reporter=junit --reporter=github-actions --reporter=default --outputFile.junit=../../test-results/protocol-http.xml
        working-directory: packages/protocol-http

      - name: Test protocol-playwright
        if: ${{ !cancelled() }}
        run: pnpm exec vitest run --reporter=junit --reporter=github-actions --reporter=default --outputFile.junit=../../test-results/protocol-playwright.xml
        working-directory: packages/protocol-playwright

      - name: Test example app
        if: ${{ !cancelled() }}
        run: pnpm exec vitest run --reporter=junit --reporter=github-actions --reporter=default --outputFile.junit=../../test-results/task-board.xml
        working-directory: examples/task-board

      - name: Test summary
        if: ${{ !cancelled() }}
        run: node .github/scripts/test-summary.mjs >> $GITHUB_STEP_SUMMARY
