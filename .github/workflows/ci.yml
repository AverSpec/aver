name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(npx playwright --version)" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Build packages
        run: |
          npm run build -w packages/aver
          npm run build -w packages/protocol-http
          npm run build -w packages/protocol-playwright
          npm run build -w examples/e-commerce

      - name: Test aver (core)
        run: npx vitest run --reporter=junit --reporter=github-actions --reporter=default --outputFile.junit=../../test-results/aver.xml
        working-directory: packages/aver

      - name: Test mcp-server
        if: ${{ !cancelled() }}
        run: npx vitest run --reporter=junit --reporter=github-actions --reporter=default --outputFile.junit=../../test-results/mcp-server.xml
        working-directory: packages/mcp-server

      - name: Test protocol-http
        if: ${{ !cancelled() }}
        run: npx vitest run --reporter=junit --reporter=github-actions --reporter=default --outputFile.junit=../../test-results/protocol-http.xml
        working-directory: packages/protocol-http

      - name: Test protocol-playwright
        if: ${{ !cancelled() }}
        run: npx vitest run --reporter=junit --reporter=github-actions --reporter=default --outputFile.junit=../../test-results/protocol-playwright.xml
        working-directory: packages/protocol-playwright

      - name: Test example app
        if: ${{ !cancelled() }}
        run: npx vitest run --reporter=junit --reporter=github-actions --reporter=default --outputFile.junit=../../test-results/e-commerce.xml
        working-directory: examples/e-commerce

      - name: Test summary
        if: ${{ !cancelled() }}
        run: node .github/scripts/test-summary.mjs >> $GITHUB_STEP_SUMMARY
