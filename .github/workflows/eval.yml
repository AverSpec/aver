name: Eval

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6am UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: |
          pnpm --filter @aver/core run build
          pnpm --filter @aver/approvals run build
          pnpm --filter @aver/agent run build

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run eval integration tests
        run: pnpm exec vitest run test/eval/integration/ --reporter=default
        working-directory: packages/agent
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
